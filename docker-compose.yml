# Trade Tracker - Docker Compose Configuration
# Run with: docker compose up --build

services:
  # PostgreSQL Database
  db:
    image: postgres:17-alpine
    container_name: trade-tracker-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: dev
    container_name: trade-tracker-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./api:/app
      - /app/.venv  # Isolate container's venv from host
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  # Angular Frontend
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      target: dev
    container_name: trade-tracker-web
    restart: unless-stopped
    ports:
      - "4200:4200"
    volumes:
      - ./web:/app
      - /app/node_modules  # Isolate container's node_modules from host
    depends_on:
      - api

volumes:
  postgres_data:
    name: trade-tracker-postgres-data
